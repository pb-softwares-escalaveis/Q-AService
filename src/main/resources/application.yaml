spring:
  application:
    name: QA-SERVICE

  datasource:
    url: jdbc:postgresql://localhost:5432/qa_service_db
    username: qa_user
    password: qa_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    clean-on-validation-error: true
    locations: classpath:db/migration

  data:
    redis:
      host: localhost
      port: 6379

  cache:
    type: redis

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      group-id: qa-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

app:
  kafka:
    topics:
      # publisher: Q&A -> Review
      qa-created-pending: "qa.created-pending"

      # consumer: Review -> Q&A (nomes emitidos pelo Review Service)
      qa-review-approved: "reviews.qa.approved"
      qa-review-rejected: "reviews.qa.rejected"

      # publisher: Q&A -> Notification (via Outbox)
      notify-question-approved: "qa.question.approved"
      notify-answer-approved: "qa.answer.approved"
      notify-question-rejected: "qa.question.rejected"
      notify-answer-rejected: "qa.answer.rejected"
    redis:
      time-to-live: 60m

  cloud:
    openfeign:
      client:
        config:
          auctionService:
            connectTimeout: 2000
            readTimeout: 2000
            loggerLevel: BASIC
      circuitbreaker:
        enabled: true

server:
  port: 8084

eureka:
  client:
    enabled: true
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
  instance:
    preferIpAddress: true

management:
  endpoints:
    web:
      exposure:
        include: health, info, circuitbreakers, prometheus  
  tracing:                                                  
    sampling:
      probability: 1.0                                      
  health:
    circuitbreakers:
      enabled: true

resilience4j:
  circuitbreaker:
    instances:
      auctionService:
        registerHealthIndicator: true
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 15s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
  retry:
    instances:
      auctionService:
        maxAttempts: 3
        waitDuration: 2s

logging:
  level:
    root: INFO
    br.com.leilao: DEBUG
    org.hibernate.SQL: DEBUG