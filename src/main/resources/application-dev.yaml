spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/qa_service_db
    username: qa_user
    password: qa_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    clean-on-validation-error: true

  data:
    redis:
      host: localhost
      port: 6379

  kafka:
    bootstrap-servers: localhost:9092

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/

logging:
  level:
    root: INFO
    br.com.leilao: DEBUG
    org.hibernate.SQL: DEBUG
    org.springframework.cloud.openfeign: DEBUG
