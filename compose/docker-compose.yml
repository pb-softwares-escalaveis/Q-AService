services:
  postgres-qa:
    image: postgres:16-alpine
    container_name: qa_service_postgres
    environment:
      POSTGRES_DB: qa_service_db
      POSTGRES_USER: qa_user
      POSTGRES_PASSWORD: qa_pass
    ports:
      - "5432:5432"
    volumes:
      - qa_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qa_user -d qa_service_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - leilao-network

  redis-qa:
    image: redis:7-alpine
    container_name: qa_service_redis
    ports:
      - "6379:6379"
    volumes:
      - qa_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - leilao-network

  qa-service:
    image: qa-service
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: qa-service
    env_file:
      - ../.env.docker
    ports:
      - "8098:8098"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8098/actuator/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 40s
    depends_on:
      postgres-qa:
        condition: service_healthy
      redis-qa:
        condition: service_healthy
    networks:
      - leilao-network

volumes:
  qa_postgres_data:
  qa_redis_data:

networks:
  leilao-network:
    name: leilao-network
    external: true
