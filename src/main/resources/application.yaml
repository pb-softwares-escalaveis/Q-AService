spring:
  application:
    name: QA-SERVICE

  profiles:
    active: dev

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      group-id: qa-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

  cloud:
    openfeign:
      client:
        config:
          auctionService:
            connectTimeout: 2000
            readTimeout: 2000
            loggerLevel: BASIC
          user-service:
            connectTimeout: 2000
            readTimeout: 2000
            loggerLevel: BASIC
      circuitbreaker:
        enabled: true
        # group.enabled=true faz o CB ter o nome do Feign client (auctionService/user-service)
        # em vez do nome derivado de método (AuctionClientgetAuctionByIdLong). Sem isso, nossa
        # config `resilience4j.circuitbreaker.instances.auctionService` NUNCA é aplicada — o CB
        # usa os defaults do Resilience4j (minimumNumberOfCalls=100), e nunca abre na prática.
        group:
          enabled: true

  cache:
    type: redis

app:
  kafka:
    topics:
      qa-review-created-pending: "qa.review.created-pending"
      qa-review-approved: "qa.review.approved"
      qa-review-rejected: "qa.review.rejected"
      notify-question-approved: "qa.question.approved"
      notify-answer-approved: "qa.answer.approved"
      notify-question-rejected: "qa.question.rejected"
      notify-answer-rejected: "qa.answer.rejected"
    redis:
      time-to-live: 60m

server:
  port: 8084

eureka:
  client:
    enabled: true
  instance:
    preferIpAddress: true

#Actuator e Resilience4j
management:
  endpoints:
    web:
      exposure:
        include: health, info, circuitbreakers, prometheus
  tracing:
    sampling:
      probability: 1.0
  health:
    circuitbreakers:
      enabled: true

resilience4j:
  circuitbreaker:
    instances:
      auctionService:
        registerHealthIndicator: true
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 15s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
      user-service:
        registerHealthIndicator: true
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 15s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
  retry:
    instances:
      auctionService:
        maxAttempts: 3
        waitDuration: 2s
      user-service:
        maxAttempts: 3
        waitDuration: 2s