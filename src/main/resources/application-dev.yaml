spring:
  datasource:
    url: jdbc:postgresql://localhost:5438/qadb
    username: qa_user
    password: qa_password
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # Para resetar o banco local: `docker compose -f compose/docker-compose.yml down -v && up -d`.
  data:
    redis:
      host: localhost
      port: 6380

  kafka:
    bootstrap-servers: localhost:9092

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/

logging:
  level:
    root: INFO
    br.com.leilao: DEBUG
    org.hibernate.SQL: DEBUG
    org.springframework.cloud.openfeign: DEBUG
