spring:
  datasource:
    url: ${QA_SERVICE_DB_URL:jdbc:postgresql://localhost:5432/qa_service_db}
    username: ${QA_SERVICE_DB_USER:qa_user}
    password: ${QA_SERVICE_DB_PASSWORD:qa_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  data:
    redis:
      host: ${QA_SERVICE_REDIS_HOST:localhost}
      port: ${QA_SERVICE_REDIS_PORT:6379}

  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:9092}

server:
  port: ${QA_SERVICE_PORT:8098}

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}

logging:
  level:
    root: INFO
    br.com.leilao: INFO
